version: '3.8'
services:
  backend-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql+psycopg_async://postgres:postgres@db:5432/licitacao_hub
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - TESTING=true
      - POETRY_VIRTUALENVS_IN_PROJECT=true
      - POETRY_CACHE_DIR=/tmp/poetry_cache
      # Other environment variables needed for your app
    volumes:
      - ./:/app
      - poetry_cache:/tmp/poetry_cache
    working_dir: /app
    user: root
    # Let the dockerfile's entrypoint and CMD handle running pytest
  
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_test:/var/lib/postgresql/data/

volumes:
  postgres_data_test:
  poetry_cache: